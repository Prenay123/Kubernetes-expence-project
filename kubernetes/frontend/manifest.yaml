apiVersion: v1
kind: Namespace
metadata:
  name: expence
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: expence
  labels:
    component: frontend
    project: expence
    tier: web
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log notice;
    pid /run/nginx.pid;

    include /usr/share/nginx/modules/*.conf;

    events {
        worker_connections 1024;
    }

    http {
        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

        access_log  /var/log/nginx/access.log  main;

        sendfile            on;
        tcp_nopush          on;
        keepalive_timeout   65;
        types_hash_max_size 4096;

        include             /etc/nginx/mime.types;
        default_type        application/octet-stream;

        include /etc/nginx/conf.d/*.conf;

        server {
            listen       8080;
            listen       [::]:8080;
            server_name  _;
            root         /usr/share/nginx/html;
            index index.html;
            location / {
                try_files $uri $uri/ /index.html;
            }  

            error_page 404 /404.html;
            location = /404.html {
            }

            error_page 500 502 503 504 /50x.html;
            location = /50x.html {
            }

            location /images/ {
              expires 5s;
              root   /usr/share/nginx/html;
              try_files $uri /images/placeholder.jpg;
            }

            location /health {
              stub_status on;
              access_log off;
            }

        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: expence
  labels:
    component: frontend
    project: expence
    tier: web
spec:
  replicas: 1
  selector:
    matchLabels:
      component: frontend
      project: expence
      tier: web
  template:
    metadata:
      labels:
        component: frontend
        project: expence
        tier: web
    spec:
      containers:
        - name: frontend
          image: prenay/frontend:v1
          imagePullPolicy: Always
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-conf
            items:
              - key: nginx.conf
                path: nginx.conf
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: expence
  labels:
    component: frontend
    project: expence
    tier: web
spec:
  type: LoadBalancer
  selector:
    component: frontend
    project: expence
    tier: web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
